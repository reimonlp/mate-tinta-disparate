services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: mate-tinta-disparate
    networks:
      - proxy-network
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.astro
      - /app/dist

networks:
  proxy-network:
    external: true
